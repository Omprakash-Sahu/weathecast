<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatheCast - Weather forecasting website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="forecast.css">
    <link rel="stylesheet" href="error.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <header class="header">
        <a  href="#" class="header__logo">
            <span>WeatheCast</span>
        </a>

        <div class="header__search">
            <input class="header__search-input" type="text" placeholder="Search City">
            <!-- <button class="header__search-btn">
                <img src="./assets/search_icon.svg" alt="Search icon">
            </button> -->

            <ul class="search-results">
                <!-- <li class="search-results__item">New Delhi</li>
                <li class="search-results__item">Delhi</li>
                <li class="search-results__item">Delhi</li>
                <li class="search-results__item">Delhi</li>
                <li class="search-results__item">Village of Delhi</li> -->
            </ul>
            
        </div>
    </header>

    <main>
        <section class="current-weather">
            <div class="current-weather__time">
                <p id="hr-min"><!--06:00--></p>
                <p id="am-pm"><!--AM--></p>
            </div>

            <div class="current-weather__date">
                <p id="day"></p>
                <p id="dd-mm-yy"></p>
            </div>
  
            <div class="current-temp">
                <img id="weather-icon" alt="weather_icon" class="current-temp__weather-icon">
                <div class="temp-value">
                    <p id="temp-value__figure"></p>
                    <div class="temp-value__degree-symbol"></div>
                    <p class="temp-value__unit">C</p>
                </div>
            </div>

            <div class="current-weather__location">
                <p id="current-weather__loc-name"></p>
                <p id="current-weather__loc-feel"></p>
            </div>

            <div class="current-weather__details">
                
                <div class="parameter">
                    <div class="parameter__key">
                        <img src="./assets/wind.svg" alt="Wind icon" class="parameter__icon">
                        <p class="parameter__name">Wind</p>
                    </div>
                    <p class="parameter__value" id="wind-speed"></p>
                </div>
                
                <div class="parameter">
                    <div class="parameter__key">
                        <img src="./assets/humidity-low.svg" alt="Humidity icon" class="parameter__icon">
                        <p class="parameter__name">Humidity</p>
                    </div>
                    <p class="parameter__value" id="humidity"></p>
                </div>
                
                <div class="parameter">
                    <div class="parameter__key">
                        <img src="./assets/visibility-outline.svg" alt="Visibility icon" class="parameter__icon">
                        <p class="parameter__name">Visibility</p>
                    </div>
                    <p class="parameter__value" id="visibility"></p>
                </div>
                
                <div class="parameter">
                    <div class="parameter__key">
                        <img src="./assets/pressure.svg" alt="Pressure icon" class="parameter__icon">
                        <p class="parameter__name">Pressure</p>
                    </div>
                    <p class="parameter__value" id="pressure"></p>
                </div>

            </div>
        </section>

        <section class="forecast">
            <h3>Next 5 day / 3 hour forecast</h3>

            <div class="forecast__days">
               <!-- Just for reference. It will be dynamically generated.
                <div class="forecast__day-card">

                    <div class="forecast__day-overview border-bottom-none">
                        <p class="forecast__day-date">Saturday, June 27</p>
                    
                        <button class="forecast__day-expand-btn" type="button">
                            <img src="assets/dropdown.svg" alt="Show hourly forecast">
                        </button>
                    </div>
                    
                    <div class="forecast__hourly-details">
                        <div class="forecast__hour-card">
                            <p class="forecast__hour">12 AM</p>
                            
                            <p class="forecast__hour-description">Clear sky</p>
                            
                            <div class="forecast__hour-weather">
                                <img class="forecast__hour-weather-icon" src="/assets/weather-icon.png" alt="Weather icon">
                                <p class="forecast__hour-temp">25 &deg;C</p>    
                            </div>                        
                        </div>       
                    </div> 

                </div>
                -->
            </div>
        </section>
    </main>
    
    <footer>
        <img src="assets/OpenWeather-Master-Logo RGB.png" alt="OpenWeather Logo" class="openweather-logo">
        <a href="https://openweathermap.org/" class="attribution">Weather data provided by OpenWeather</a>
    </footer>
    
    <section class="show-error">
        <div class="show-error__card">
            <p class="show-error__message">Something went wrong. Please check your connection and try again.</p>
        </div>
        <a href="http://127.0.0.1:5500/index.html" class="show-error__ok">Ok</a>
    </section>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
