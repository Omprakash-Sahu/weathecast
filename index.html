<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatheCast - Weather forecasting website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <a  href="#" class="header__logo">
            <span>WeatheCast</span>
        </a>

        <div class="header__search">
            <input class="header__search-input" type="text" placeholder="Search City">
            <button class="header__search-btn">
                <img src="/assets/search_icon.svg" alt="Search icon">
            </button>
        </div>
    </header>

    <main>
        <section class="current-weather">
            <div class="current-weather__time">
                <p id="hr-min">06:00</p>
                <p id="am-pm">AM</p>
            </div>

            <div class="current-weather__date">
                <p id="day">Thursday,</p>
                <p id="dd-mm-yy">11 January 2024</p>
            </div>

            <div class="current-temp">
                <img src="/assets/weather_icon.svg" alt="weather_icon" class="current-temp__weather-icon">
                <div class="temp-value">
                    <p class="temp-value__figure">10</p>
                    <div class="temp-value__degree-symbol"></div>
                    <p class="temp-value__unit">C</p>
                </div>
            </div>

            <div class="current-weather__location">
                <p class="current-weather__loc-name">New Delhi, India</p>
                <p class="current-weather__loc-feel">Clear sky. Light breeze</p>
            </div>

            <div class="current-weather__details">
                
                <div class="parameter">
                    <div class="parameter__key">
                        <img src="/assets/wind.svg" alt="Wind icon" class="parameter__icon">
                        <p class="parameter__name">Wind</p>
                    </div>
                    <p class="parameter__value">1 m/s NNE</p>
                </div>
                
                <div class="parameter">
                    <div class="parameter__key">
                        <img src="/assets/humidity-low.svg" alt="Humidity icon" class="parameter__icon">
                        <p class="parameter__name">Humidity</p>
                    </div>
                    <p class="parameter__value">74%</p>
                </div>
                
                <div class="parameter">
                    <div class="parameter__key">
                        <img src="/assets/visibility-outline.svg" alt="Visibility icon" class="parameter__icon">
                        <p class="parameter__name">Visibility</p>
                    </div>
                    <p class="parameter__value">10km</p>
                </div>
                
                <div class="parameter">
                    <div class="parameter__key">
                        <img src="/assets/pressure.svg" alt="Pressure icon" class="parameter__icon">
                        <p class="parameter__name">Pressure</p>
                    </div>
                    <p class="parameter__value">1005 hPa</p>
                </div>

            </div>
        </section>


    </main>

    <footer>
        <!-- For attribution to OpenWeatherMap -->
    </footer>
</body>
</html>
